<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg" style="max-width: 680px; display: block; margin-inline: auto;">
  <title>MongoLens icon</title>
  <desc>MongoLens icon with all DB partition lines using identical ellipse arcs.</desc>
  <defs>
    <clipPath id="iconclip"><rect x="140" y="40" width="400" height="400" rx="80"></rect></clipPath>
    <clipPath id="bottomHalf"><rect x="-55" y="48" width="110" height="20"></rect></clipPath>
    <clipPath id="mid1Half"><rect x="-55" y="-16" width="110" height="20"></rect></clipPath>
    <clipPath id="mid2Half"><rect x="-55" y="16" width="110" height="20"></rect></clipPath>
    <clipPath id="lensClip"><circle cx="400" cy="270" r="40"></circle></clipPath>
  </defs>
  <rect x="140" y="40" width="400" height="400" rx="80" fill="#001E2B"></rect>
  <g clip-path="url(#iconclip)">
    <g transform="translate(330,218) scale(1.7)">
      <!-- Top ellipse (full) -->
      <ellipse cx="0" cy="-52" rx="52" ry="16" fill="none" stroke="#00ED64" stroke-width="7" stroke-linecap="round"></ellipse>
      <!-- Side walls -->
      <path d="M-52,-52 L-52,48" fill="none" stroke="#00ED64" stroke-width="7" stroke-linecap="round"></path>
      <path d="M52,-52 L52,48" fill="none" stroke="#00ED64" stroke-width="7" stroke-linecap="round"></path>
      <!-- Middle ellipse 1 — bottom half only, centered at y=-16 -->
      <ellipse cx="0" cy="-16" rx="52" ry="16" fill="none" stroke="#00ED64" stroke-width="7" stroke-linecap="round" clip-path="url(#mid1Half)"></ellipse>
      <!-- Middle ellipse 2 — bottom half only, centered at y=16 -->
      <ellipse cx="0" cy="16" rx="52" ry="16" fill="none" stroke="#00ED64" stroke-width="7" stroke-linecap="round" clip-path="url(#mid2Half)"></ellipse>
      <!-- Bottom ellipse — bottom half only -->
      <ellipse cx="0" cy="48" rx="52" ry="16" fill="none" stroke="#00ED64" stroke-width="7" stroke-linecap="round" clip-path="url(#bottomHalf)"></ellipse>
    </g>
    <!-- Lens fill -->
    <circle cx="400" cy="270" r="40" fill="#001E2B"></circle>
    <g clip-path="url(#lensClip)">
      <line x1="360" y1="270" x2="440" y2="270" stroke="#00ED64" stroke-width="2" stroke-linecap="round" opacity="0.55"></line>
      <line x1="400" y1="230" x2="400" y2="310" stroke="#00ED64" stroke-width="2" stroke-linecap="round" opacity="0.55"></line>
      <circle cx="400" cy="270" r="16" fill="none" stroke="#00ED64" stroke-width="1.5" opacity="0.45"></circle>
      <circle cx="400" cy="270" r="28" fill="none" stroke="#00ED64" stroke-width="1.2" opacity="0.3"></circle>
    </g>
    <circle cx="400" cy="270" r="44" fill="none" stroke="#001E2B" stroke-width="13"></circle>
    <circle cx="400" cy="270" r="44" fill="none" stroke="#ffffff" stroke-width="7"></circle>
    <line x1="433" y1="301" x2="486" y2="354" stroke="#001E2B" stroke-width="13" stroke-linecap="round"></line>
    <line x1="433" y1="301" x2="486" y2="354" stroke="#ffffff" stroke-width="7" stroke-linecap="round"></line>
  </g>
  <text x="340" y="490" text-anchor="middle" font-family="-apple-system,'Inter',sans-serif" font-size="52" font-weight="800" fill="#001E2B" letter-spacing="-1.5">Mongo<tspan fill="#00ED64">Lens</tspan></text>
  <text x="340" y="524" text-anchor="middle" font-family="-apple-system,'Inter',sans-serif" font-size="14" font-weight="400" fill="#3D7A65" letter-spacing="4">MONGODB EXPLORER</text>
  <rect x="300" y="534" width="80" height="3" rx="1.5" fill="#00ED64"></rect>
</svg>